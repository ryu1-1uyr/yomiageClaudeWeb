<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        font-size: 14px;
        min-width: 220px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      button {
        padding: 6px;
        cursor: pointer;
      }
      select {
        width: 100%;
        padding: 4px;
      }
      fieldset {
        border: 1px solid #ccc;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px;
      }
      legend {
        font-size: 12px;
        color: #555;
      }
      .engine-note {
        font-size: 12px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <label><input type="checkbox" id="enabled" />読み上げ ON</label>
    <fieldset>
      <legend>話者</legend>
      <select id="voice-select"></select>
      <div id="engine-notes" class="engine-note"></div>
    </fieldset>
    <button id="read-last">最後の返答を読む</button>
    <button id="stop">停止</button>
    <script src="popup.js"></script>
  </body>
</html>
