<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: sans-serif;
        font-size: 14px;
        min-width: 220px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      button {
        padding: 6px;
        cursor: pointer;
      }
      select {
        width: 100%;
        padding: 4px;
      }
      fieldset {
        border: 1px solid #ccc;
        border-radius: 4px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px;
      }
      legend {
        font-size: 12px;
        color: #555;
      }
      .engine-note {
        font-size: 12px;
        color: #999;
      }
      #dict-section {
        display: none;
      }
      #dict-section.visible {
        display: flex;
      }
      #dict-section input {
        width: 100%;
        padding: 4px;
        font-size: 12px;
        box-sizing: border-box;
      }
      #dict-status {
        font-size: 11px;
        min-height: 1em;
      }
      #dict-status.ok { color: #2a7d2a; }
      #dict-status.error { color: #c0392b; }
    </style>
  </head>
  <body>
    <label><input type="checkbox" id="enabled" />読み上げ ON</label>
    <fieldset>
      <legend>話者</legend>
      <select id="voice-select"></select>
      <div id="engine-notes" class="engine-note"></div>
    </fieldset>
    <fieldset>
      <legend>音量</legend>
      <input type="range" id="volume" min="0" max="100" step="1" />
      <span id="volume-value"></span>
    </fieldset>
    <button id="read-last">最後の返答を読む</button>
    <button id="stop">停止</button>
    <fieldset id="dict-section">
      <legend>辞書登録</legend>
      <input type="text" id="dict-surface" placeholder="表層形 (例: Rust)" />
      <input type="text" id="dict-kana" placeholder="読み (ひらがな可)" />
      <button id="dict-register" style="width:100%">登録</button>
      <div id="dict-status"></div>
    </fieldset>
    <script src="popup.js"></script>
  </body>
</html>
